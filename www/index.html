<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a0e1a" />
<title>DainikState App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #splash {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; transition: opacity 0.5s;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash img { width: 120px; height: 120px; border-radius: 50%; box-shadow: 0 0 40px rgba(255,107,107,0.6); animation: pulse 1.5s infinite; }
  #splash h1 { font-size: 28px; font-weight: 900; margin-top: 24px; background: linear-gradient(90deg, #fff, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #splash p { font-size: 14px; opacity: 0.7; margin-top: 8px; }
  .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #ff6b6b; border-radius: 50%; margin-top: 32px; animation: spin 0.8s linear infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  iframe#webview { width: 100%; height: 100%; border: 0; display: block; }
  .err {
    position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
    background: #0a0e1a; color: #fff; padding: 20px; text-align: center; z-index: 9998;
  }
  .err.show { display: flex; }
  .err .icon { font-size: 60px; margin-bottom: 16px; }
  .err h2 { font-size: 20px; margin-bottom: 8px; }
  .err p { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }
  .err button { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: 0; padding: 12px 28px; border-radius: 24px; font-size: 15px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div id="splash">
  <img src="logo.png" alt="DainikState" />
  <h1>DainikState</h1>
  <p>राज्य की आवाज़</p>
  <div class="spinner"></div>
</div>

<div class="err" id="err">
  <div class="icon">📡</div>
  <h2>इंटरनेट नहीं है</h2>
  <p>कनेक्शन चेक करें और दोबारा कोशिश करें</p>
  <button onclick="location.reload()">दोबारा कोशिश करें</button>
</div>

<iframe id="webview" src="https://canyou-uqkp.onrender.com/" allow="microphone; camera; autoplay; encrypted-media; fullscreen; picture-in-picture"></iframe>

<script>
  const splash = document.getElementById('splash');
  const errBox = document.getElementById('err');
  const iframe = document.getElementById('webview');

  function hideSplash() { splash.classList.add('hide'); setTimeout(() => splash.remove(), 500); }

  iframe.addEventListener('load', () => setTimeout(hideSplash, 800));
  setTimeout(hideSplash, 6000);

  function checkOnline() {
    if (!navigator.onLine) { errBox.classList.add('show'); return false; }
    errBox.classList.remove('show'); return true;
  }
  window.addEventListener('online', () => { if (checkOnline()) iframe.src = iframe.src; });
  window.addEventListener('offline', () => errBox.classList.add('show'));
  checkOnline();

  // Android back button: go back in iframe history
  let lastBack = 0;
  document.addEventListener('backbutton', function(e) {
    e.preventDefault();
    try { if (iframe.contentWindow.history.length > 1) { iframe.contentWindow.history.back(); } else { navigator.app.exitApp(); } }
    catch(err) { navigator.app.exitApp(); }
  }, false);
</script>

</body>
</html>
